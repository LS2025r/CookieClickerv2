<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookieClicker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-content">
      <section class="main-area">
        <div class="stats">
          <h1 id="cookie-count">0</h1>
          <p id="cookies-per-second">per sec: 0</p>
        </div>
        <div class="cookie-container">
          <img
            src="/img/cookiev3.png"
            alt="Cookie"
            id="cookie-button"
            class="cookie-image"
          />
        </div>
        <div id="golden-cookie" class="hidden-cookie">⭐</div>
      </section>

      <section class="shop-area">
        <h2>Store</h2>
        <div class="upgrade-list">
          <button class="upgrade-item" id="buy-cursor">
            <div class="upgrade-info">
              <span class="name">Cursor</span>
              <span class="cost">15 cookies</span>
            </div>
            <span class="count" id="grandma-count">0</span>
          </button>

          <button class="upgrade-item" id="buy-double-cookie">
            <div class="upgrade-info">
              <span class="name-db">Double Cookie</span>
              <span class="cost-db">20 cookies</span>
            </div>
            <span class="count" id="double-cookie-count">0</span>
          </button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
